name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'src-tauri/tauri.conf.json'
      - 'src-tauri/binaries/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm manual release'
        required: true
        type: string

# Required for OIDC token issuance for the rebuild job. The release API itself
# is protected by the app/admin bearer-token guard, so upload/update requests use
# RELEASE_API_BEARER_TOKEN rather than SigV4.
permissions:
  id-token: write
  contents: read

env:
  APP_NAME: Kaleidomo
  RELEASE_API: ${{ secrets.RELEASE_API_URL }}
  RELEASE_API_BEARER_TOKEN: ${{ secrets.RELEASE_API_BEARER_TOKEN }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  # ── Windows build ─────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Derive version and slug from tauri.conf.json
        shell: bash
        run: |
          VERSION=$(python -c "import json; d=json.load(open('src-tauri/tauri.conf.json', encoding='utf-8')); print(d['version'])")
          SLUG=$(python -c "import json; d=json.load(open('src-tauri/tauri.conf.json', encoding='utf-8')); print(d['productName'].lower().replace(' ', '-'))")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SLUG=$SLUG" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: release-windows-${{ github.run_id }}

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-11-07
          targets: x86_64-pc-windows-msvc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Node deps
        run: bun install

      - name: Set Azure Trusted Signing env
        shell: pwsh
        run: |
          echo "AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $env:GITHUB_ENV
          echo "AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" >> $env:GITHUB_ENV
          echo "AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $env:GITHUB_ENV

      - name: Install trusted-signing-cli
        shell: pwsh
        run: cargo install trusted-signing-cli --quiet

      - name: Build Tauri (Windows)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri:build

      - name: Debug bundle output
        shell: pwsh
        if: always()
        run: |
          Write-Host "=== Bundle/search diagnostics ==="
          foreach ($root in @("src-tauri/target", "target")) {
            if (Test-Path $root) {
              Write-Host "=== Searching $root ==="
              Get-ChildItem -Recurse $root -Include "*.exe","*.msi","*.dmg","*.app.tar.gz" -ErrorAction SilentlyContinue |
                Select-Object FullName
            } else {
              Write-Host "$root does not exist"
            }
          }
        continue-on-error: true

      - name: Locate NSIS installer
        shell: pwsh
        run: |
          $searchRoots = @("src-tauri/target", "target") | Where-Object { Test-Path $_ }
          if ($searchRoots.Count -eq 0) {
            Write-Error "No target directories found. Expected either src-tauri/target or target."
            exit 1
          }

          $installer = $null
          foreach ($root in $searchRoots) {
            $installer = Get-ChildItem -Recurse $root -File -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Extension -ieq ".exe" -and
                ($_.FullName -match "[\\/]bundle[\\/]nsis[\\/]" -or $_.Name -match "setup|installer")
              } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -First 1

            if ($installer) { break }
          }

          if (-not $installer) {
            Write-Error "No NSIS installer .exe found under src-tauri/target or target. Check the Debug bundle output step above."
            exit 1
          }

          echo "INSTALLER_PATH=$($installer.FullName)" >> $env:GITHUB_ENV
          echo "INSTALLER_NAME=$($installer.Name)" >> $env:GITHUB_ENV
          Write-Host "Found NSIS installer: $($installer.FullName)"

      - name: Compute SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash "$env:INSTALLER_PATH" -Algorithm SHA256).Hash.ToLower()
          echo "FILE_SHA256=$hash" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: ${{ env.INSTALLER_PATH }}
          retention-days: 1

      - name: Upload NSIS to S3 and update content/downloads
        shell: bash
        env:
          PLATFORM: windows
          FILE_PATH: ${{ env.INSTALLER_PATH }}
          FILE_NAME: ${{ env.INSTALLER_NAME }}
          CONTENT_TYPE: application/octet-stream
        run: |
          if [ -z "$RELEASE_API" ]; then
            echo "Missing RELEASE_API_URL secret." >&2
            exit 1
          fi
          if [ -z "$RELEASE_API_BEARER_TOKEN" ]; then
            echo "Missing RELEASE_API_BEARER_TOKEN secret. This endpoint requires Authorization: Bearer <token>." >&2
            exit 1
          fi

          python << 'PYEOF'
          import json
          import mimetypes
          import os
          import urllib.error
          import urllib.request
          
          api_base = os.environ["RELEASE_API"].rstrip("/")
          token = os.environ["RELEASE_API_BEARER_TOKEN"]
          slug = os.environ["SLUG"]
          version = os.environ["VERSION"]
          platform = os.environ["PLATFORM"]
          filename = os.environ["FILE_NAME"]
          filepath = os.environ["FILE_PATH"]
          content_type = os.environ.get("CONTENT_TYPE") or mimetypes.guess_type(filename)[0] or "application/octet-stream"
          sha256 = os.environ["FILE_SHA256"]
          
          
          def request_json(path, payload):
              body = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  f"{api_base}/{path.lstrip('/')}",
                  data=body,
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      raw = resp.read().decode("utf-8")
                      try:
                          return json.loads(raw)
                      except json.JSONDecodeError as exc:
                          raise RuntimeError(f"{path} returned non-JSON response: {raw[:1000]}") from exc
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"{path} failed with HTTP {exc.code}: {raw[:2000]}") from exc
          
          
          def put_file(upload_url):
              size = os.path.getsize(filepath)
              with open(filepath, "rb") as f:
                  req = urllib.request.Request(
                      upload_url,
                      data=f,
                      method="PUT",
                      headers={
                          "Content-Type": content_type,
                          "Content-Length": str(size),
                      },
                  )
                  try:
                      with urllib.request.urlopen(req, timeout=1800) as resp:
                          resp.read()
                  except urllib.error.HTTPError as exc:
                      raw = exc.read().decode("utf-8", errors="replace")
                      raise RuntimeError(f"S3 PUT failed with HTTP {exc.code}: {raw[:2000]}") from exc
              return size
          
          
          presign = request_json("presign", {
              "slug": slug,
              "version": version,
              "platform": platform,
              "filename": filename,
              "contentType": content_type,
          })
          print("Presign complete:", json.dumps({"key": presign.get("key"), "publicUrl": presign.get("publicUrl")}, indent=2))
          
          missing = [key for key in ("uploadUrl", "key", "publicUrl") if key not in presign]
          if missing:
              raise RuntimeError(f"Presign response missing required field(s): {missing}. Full response: {presign}")
          
          size = put_file(presign["uploadUrl"])
          print(f"S3 upload complete: {size} bytes")
          
          confirm = request_json("confirm", {
              "slug": slug,
              "version": version,
              "platform": platform,
              "new_key": presign["key"],
              "new_url": presign["publicUrl"],
              "sha256": sha256,
          })
          print("content/downloads update complete:", json.dumps(confirm, indent=2))
          PYEOF

  # ── macOS build ───────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Derive version and slug from tauri.conf.json
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('src-tauri/tauri.conf.json', encoding='utf-8')); print(d['version'])")
          SLUG=$(python3 -c "import json; d=json.load(open('src-tauri/tauri.conf.json', encoding='utf-8')); print(d['productName'].lower().replace(' ', '-'))")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "SLUG=$SLUG" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: release-macos-${{ github.run_id }}

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-11-07
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Node deps
        run: bun install

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build Tauri (universal macOS)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri:build -- --target universal-apple-darwin

      - name: Debug bundle output
        if: always()
        run: |
          echo "=== Bundle/search diagnostics ==="
          for root in src-tauri/target target; do
            if [ -d "$root" ]; then
              echo "=== Searching $root ==="
              find "$root" -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app" \) -print || true
            else
              echo "$root does not exist"
            fi
          done
        continue-on-error: true

      - name: Locate DMG
        run: |
          DMG=""
          for root in src-tauri/target target; do
            if [ -d "$root" ]; then
              DMG=$(find "$root" -type f -path "*/bundle/dmg/*.dmg" -print | sort | tail -n 1)
              if [ -n "$DMG" ]; then
                break
              fi
            fi
          done

          if [ -z "$DMG" ]; then
            for root in src-tauri/target target; do
              if [ -d "$root" ]; then
                DMG=$(find "$root" -type f -name "*.dmg" -print | sort | tail -n 1)
                if [ -n "$DMG" ]; then
                  break
                fi
              fi
            done
          fi

          if [ -z "$DMG" ]; then
            echo "No DMG found under src-tauri/target or target. Check the Debug bundle output step above." >&2
            exit 1
          fi

          echo "DMG_PATH=$DMG" >> "$GITHUB_ENV"
          echo "DMG_NAME=$(basename "$DMG")" >> "$GITHUB_ENV"
          echo "Found DMG: $DMG"

      - name: Compute SHA-256
        run: |
          echo "FILE_SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ env.DMG_PATH }}
          retention-days: 1

      - name: Upload DMG to S3 and update content/downloads
        env:
          PLATFORM: macos
          FILE_PATH: ${{ env.DMG_PATH }}
          FILE_NAME: ${{ env.DMG_NAME }}
          CONTENT_TYPE: application/x-apple-diskimage
        run: |
          if [ -z "$RELEASE_API" ]; then
            echo "Missing RELEASE_API_URL secret." >&2
            exit 1
          fi
          if [ -z "$RELEASE_API_BEARER_TOKEN" ]; then
            echo "Missing RELEASE_API_BEARER_TOKEN secret. This endpoint requires Authorization: Bearer <token>." >&2
            exit 1
          fi

          python3 << 'PYEOF'
          import json
          import mimetypes
          import os
          import urllib.error
          import urllib.request
          
          api_base = os.environ["RELEASE_API"].rstrip("/")
          token = os.environ["RELEASE_API_BEARER_TOKEN"]
          slug = os.environ["SLUG"]
          version = os.environ["VERSION"]
          platform = os.environ["PLATFORM"]
          filename = os.environ["FILE_NAME"]
          filepath = os.environ["FILE_PATH"]
          content_type = os.environ.get("CONTENT_TYPE") or mimetypes.guess_type(filename)[0] or "application/octet-stream"
          sha256 = os.environ["FILE_SHA256"]
          
          
          def request_json(path, payload):
              body = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  f"{api_base}/{path.lstrip('/')}",
                  data=body,
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      raw = resp.read().decode("utf-8")
                      try:
                          return json.loads(raw)
                      except json.JSONDecodeError as exc:
                          raise RuntimeError(f"{path} returned non-JSON response: {raw[:1000]}") from exc
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"{path} failed with HTTP {exc.code}: {raw[:2000]}") from exc
          
          
          def put_file(upload_url):
              size = os.path.getsize(filepath)
              with open(filepath, "rb") as f:
                  req = urllib.request.Request(
                      upload_url,
                      data=f,
                      method="PUT",
                      headers={
                          "Content-Type": content_type,
                          "Content-Length": str(size),
                      },
                  )
                  try:
                      with urllib.request.urlopen(req, timeout=1800) as resp:
                          resp.read()
                  except urllib.error.HTTPError as exc:
                      raw = exc.read().decode("utf-8", errors="replace")
                      raise RuntimeError(f"S3 PUT failed with HTTP {exc.code}: {raw[:2000]}") from exc
              return size
          
          
          presign = request_json("presign", {
              "slug": slug,
              "version": version,
              "platform": platform,
              "filename": filename,
              "contentType": content_type,
          })
          print("Presign complete:", json.dumps({"key": presign.get("key"), "publicUrl": presign.get("publicUrl")}, indent=2))
          
          missing = [key for key in ("uploadUrl", "key", "publicUrl") if key not in presign]
          if missing:
              raise RuntimeError(f"Presign response missing required field(s): {missing}. Full response: {presign}")
          
          size = put_file(presign["uploadUrl"])
          print(f"S3 upload complete: {size} bytes")
          
          confirm = request_json("confirm", {
              "slug": slug,
              "version": version,
              "platform": platform,
              "new_key": presign["key"],
              "new_url": presign["publicUrl"],
              "sha256": sha256,
          })
          print("content/downloads update complete:", json.dumps(confirm, indent=2))
          PYEOF

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

  # ── Trigger Amplify rebuild after both platforms upload ──────────────────
  rebuild-site:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: release-rebuild-${{ github.run_id }}

      - name: Trigger Amplify rebuild via webhook
        run: |
          REBUILD_URL=$(aws ssm get-parameter \
            --name "/abc-dev/rebuild-url" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)

          curl -sf -X POST "$REBUILD_URL"
          echo "Amplify rebuild triggered"
