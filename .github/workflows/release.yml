name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'src-tauri/tauri.conf.json'
      - 'src-tauri/binaries/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm manual release'
        required: true
        type: string

# Required for OIDC token issuance (AWS role assumption — no long-lived secrets)
permissions:
  id-token: write   # OIDC JWT
  contents: read    # checkout

env:
  APP_NAME: Kaleidomo
  RELEASE_API: ${{ secrets.RELEASE_API_URL }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  # ── Windows build ─────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Derive version and slug from tauri.conf.json
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('src-tauri/tauri.conf.json')); print(d['version'])")
          SLUG=$(python3 -c "import json; d=json.load(open('src-tauri/tauri.conf.json')); print(d['productName'].lower())")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SLUG=$SLUG" >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: release-windows-${{ github.run_id }}

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-11-07
          targets: x86_64-pc-windows-msvc

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Node deps
        working-directory: src-tauri/../
        run: bun install

      - name: Set Azure Trusted Signing env
        shell: pwsh
        run: |
          echo "AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" >> $env:GITHUB_ENV
          echo "AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" >> $env:GITHUB_ENV
          echo "AZURE_TENANT_ID=${{ secrets.AZURE_TENANT_ID }}" >> $env:GITHUB_ENV

      - name: Install trusted-signing-cli
        shell: pwsh
        run: cargo install trusted-signing-cli --quiet

      - name: Build Tauri (Windows)
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri:build

      - name: Debug bundle output
        shell: pwsh
        if: always()
        run: |
          Write-Host "=== Searching entire target dir for bundles ==="
          if (Test-Path "src-tauri/target") {
            Get-ChildItem -Recurse "src-tauri/target" -Include "*setup*.exe","*.msi","*.nsis" -ErrorAction SilentlyContinue | Select-Object FullName
            Write-Host "=== Top-level target contents ==="
            Get-ChildItem "src-tauri/target" | Select-Object Name
          } else {
            Write-Host "src-tauri/target does not exist at all"
          }
        continue-on-error: true

      - name: Locate NSIS installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Recurse `
            "src-tauri/target/release/bundle/nsis" `
            -Filter "*-setup.exe" | Select-Object -First 1
          echo "INSTALLER_PATH=$($installer.FullName)" >> $env:GITHUB_ENV
          echo "INSTALLER_NAME=$($installer.Name)" >> $env:GITHUB_ENV

      - name: Compute SHA-256
        shell: pwsh
        run: |
          $hash = (Get-FileHash "$env:INSTALLER_PATH" -Algorithm SHA256).Hash.ToLower()
          echo "FILE_SHA256=$hash" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ env.INSTALLER_PATH }}
          retention-days: 1

      - name: Upload to S3 via release API (SigV4)
        shell: pwsh
        run: |
          pip install awscurl --quiet

          # Step 1 – presign (SigV4 signed POST)
          $presignJson = awscurl --service execute-api --region $env:AWS_REGION `
            -X POST "$env:RELEASE_API/presign" `
            -H "Content-Type: application/json" `
            -d "{`"slug`":`"$env:SLUG`",`"version`":`"$env:VERSION`",`"platform`":`"windows`",`"filename`":`"$env:INSTALLER_NAME`",`"contentType`":`"application/octet-stream`"}"

          Write-Host "Presign response: $presignJson"
          $presign = $presignJson | ConvertFrom-Json

          # Step 2 – PUT binary directly to S3
          $bytes = [System.IO.File]::ReadAllBytes("$env:INSTALLER_PATH")
          Invoke-RestMethod -Method PUT -Uri $presign.uploadUrl `
            -Headers @{ "Content-Type" = "application/octet-stream" } -Body $bytes

          # Step 3 – confirm (SigV4 signed POST)
          awscurl --service execute-api --region $env:AWS_REGION `
            -X POST "$env:RELEASE_API/confirm" `
            -H "Content-Type: application/json" `
            -d "{`"slug`":`"$env:SLUG`",`"version`":`"$env:VERSION`",`"platform`":`"windows`",`"new_key`":`"$($presign.key)`",`"new_url`":`"$($presign.publicUrl)`",`"sha256`":`"$env:FILE_SHA256`"}"

          echo "Windows upload complete: $($presign.publicUrl)"

  # ── macOS build ───────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    needs: []   # run in parallel with windows

    steps:
      - uses: actions/checkout@v4

      - name: Derive version and slug from tauri.conf.json
        shell: bash
        run: |
          VERSION=$(python3 -c "import json; d=json.load(open('src-tauri/tauri.conf.json')); print(d['version'])")
          SLUG=$(python3 -c "import json; d=json.load(open('src-tauri/tauri.conf.json')); print(d['productName'].lower())")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SLUG=$SLUG" >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: release-macos-${{ github.run_id }}

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-11-07
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Node deps
        run: bun install

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build Tauri (universal macOS)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri:build -- --target universal-apple-darwin

      - name: Locate DMG
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg \
            -name "*.dmg" | head -1)
          echo "DMG_PATH=$DMG" >> $GITHUB_ENV
          echo "DMG_NAME=$(basename $DMG)" >> $GITHUB_ENV

      - name: Compute SHA-256
        run: |
          echo "FILE_SHA256=$(shasum -a 256 "$DMG_PATH" | awk '{print $1}')" >> $GITHUB_ENV

      - name: Install awscurl
        run: |
          brew install pipx
          pipx install awscurl --force
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Upload to S3 via release API (SigV4)
        env:
          AWS_ACCESS_KEY_ID: ${{ env.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ env.AWS_SESSION_TOKEN }}
        run: |
          # Step 1 – presign (SigV4 signed POST)
          PRESIGN=$($HOME/.local/bin/awscurl --service execute-api --region "$AWS_REGION" \
            -X POST "$RELEASE_API/presign" \
            -H "Content-Type: application/json" \
            -d "{\"slug\":\"$SLUG\",\"version\":\"$VERSION\",\"platform\":\"macos\",\"filename\":\"$DMG_NAME\",\"contentType\":\"application/x-apple-diskimage\"}")

          echo "Presign response: $PRESIGN"

          UPLOAD_URL=$(echo "$PRESIGN" | python3 -c "import sys,json; print(json.load(sys.stdin)['uploadUrl'])")
          S3_KEY=$(echo "$PRESIGN"     | python3 -c "import sys,json; print(json.load(sys.stdin)['key'])")
          PUBLIC_URL=$(echo "$PRESIGN" | python3 -c "import sys,json; print(json.load(sys.stdin)['publicUrl'])")

          # Step 2 – PUT binary directly to S3
          echo "Uploading $(du -sh "$DMG_PATH" | cut -f1)..."
          curl -sf -X PUT "$UPLOAD_URL" \
            -H "Content-Type: application/x-apple-diskimage" \
            --data-binary "@$DMG_PATH"

          # Step 3 – confirm (SigV4 signed POST)
          $HOME/.local/bin/awscurl --service execute-api --region "$AWS_REGION" \
            -X POST "$RELEASE_API/confirm" \
            -H "Content-Type: application/json" \
            -d "{\"slug\":\"$SLUG\",\"version\":\"$VERSION\",\"platform\":\"macos\",\"new_key\":\"$S3_KEY\",\"new_url\":\"$PUBLIC_URL\",\"sha256\":\"$FILE_SHA256\"}"

          echo "macOS upload complete: $PUBLIC_URL"

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true

  # ── Trigger Amplify rebuild after both platforms upload ──────────────────
  rebuild-site:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: release-rebuild-${{ github.run_id }}

      - name: Trigger Amplify rebuild via webhook
        run: |
          REBUILD_URL=$(aws ssm get-parameter \
            --name "/abc-dev/rebuild-url" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)

          curl -sf -X POST "$REBUILD_URL"
          echo "Amplify rebuild triggered"